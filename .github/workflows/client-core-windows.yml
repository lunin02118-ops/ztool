name: client-core-windows

on:
  pull_request:
    paths:
      - "client-core/**"
      - "localization/**"
      - "docs/localization/**"
      - "build_ru_bom_template.py"
      - "BOM表模板/**"
      - "SWTools-base.exe"
      - "SWTools.exe"
      - ".github/workflows/client-core-windows.yml"
  push:
    branches:
      - main
      - "hardening/**"
    paths:
      - "client-core/**"
      - "localization/**"
      - "docs/localization/**"
      - "build_ru_bom_template.py"
      - "BOM表模板/**"
      - "SWTools-base.exe"
      - "SWTools.exe"
      - ".github/workflows/client-core-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build client core and reinject
        run: |
          cd client-core
          ./build.ps1

      - name: Verify reinjected output
        run: dotnet run -c Release --project client-core/tools/Reinjector -- --verify client-core/out/SWTools.exe

      - name: Localization scan
        run: |
          python client-core/tools/localization_scan.py `
            --exe client-core/out/SWTools.exe `
            --translations client-core/tools/Localizer/translations.tsv `
            --whitelist-dir localization `
            --report client-core/out/localization-report.json `
            --fail-on-unclassified

      - name: Build Russian BOM template smoke
        run: python build_ru_bom_template.py --out "$env:TEMP\bom_шаблон_phase07_test.xlsx"
