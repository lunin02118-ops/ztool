name: license-server

on:
  pull_request:
    paths:
      - "license-server/**"
      - ".github/workflows/license-server.yml"
  push:
    branches:
      - main
      - "hardening/**"
    paths:
      - "license-server/**"
      - ".github/workflows/license-server.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: license-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Ruff critical lint
        run: ruff check .

      - name: Compile Python
        run: python -m compileall swtools_license_server tests

      - name: Bandit security scan
        env:
          PYTHONIOENCODING: utf-8
        run: bandit -q -r swtools_license_server -c pyproject.toml

      - name: Pytest
        run: pytest -q --cov=swtools_license_server --cov-report=term-missing
