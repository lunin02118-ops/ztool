name: license-server

on:
  pull_request:
    paths:
      - "license-server/**"
      - ".github/workflows/license-server.yml"
  push:
    branches:
      - main
      - "hardening/**"
    paths:
      - "license-server/**"
      - ".github/workflows/license-server.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: license-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Install
        run: python -m pip install -e ".[dev]" -c constraints.txt

      - name: Ruff critical lint
        run: ruff check .

      - name: Compile Python
        run: python -m compileall swtools_license_server tests

      - name: Bandit security scan
        env:
          PYTHONIOENCODING: utf-8
        run: bandit -q -r swtools_license_server -c pyproject.toml

      - name: Pytest
        run: pytest -q --cov=swtools_license_server --cov-report=term-missing --cov-fail-under=85

      - name: Runtime dependency audit
        run: python -m pip_audit -r requirements.txt --strict --progress-spinner off

      - name: Install OSV scanner
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.2.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: OSV dependency audit
        run: osv-scanner scan -L requirements.txt
