name: release-acceptance

# From-source release acceptance gate (Tier 1-2, no SolidWorks required).
# Adapted from the binary-path gate (PR #28) to the from-source path: instead of
# verifying hashes of the legacy reinjected bundle, it BUILDS the client from
# client-src and asserts the produced artifact, then runs the build-method-
# independent deterministic checks (no-CJK names, BOM template/config pre-flight,
# BOM export asserter). Visual A/B, hardware licensing and screenshots stay
# manual (see docs/release/BOEVOY_E2E_TEST_RUNBOOK_RU.md).

on:
  pull_request:
    paths:
      - "client-src/**"
      - "client-src-addin/**"
      - "SWTools.settings"
      - "help_ru.chm"
      - "client-core/dist/SWTools.settings"
      - "client-core/tools/check_bom_template.py"
      - "SolidWorksTemplates/**"
      - "Шаблоны спецификации/**"
      - "tools/**"
      - "docs/localization/*.json"
      - "tools/brand_boundary/**"
      - "scripts/swtools_visual_localization_capture.py"
      - "docs/localization/**"
      - "manual-test-reports/visual-opener-harness-20260625/**"
      - "docs/architecture/BRAND_BOUNDARY_RU.md"
      - ".github/workflows/release-acceptance.yml"
  push:
    branches:
      - main
      - "hardening/**"
    paths:
      - "client-src/**"
      - "client-src-addin/**"
      - "SWTools.settings"
      - "help_ru.chm"
      - "client-core/dist/SWTools.settings"
      - "client-core/tools/check_bom_template.py"
      - "SolidWorksTemplates/**"
      - "Шаблоны спецификации/**"
      - "tools/**"
      - "docs/localization/*.json"
      - "tools/brand_boundary/**"
      - "scripts/swtools_visual_localization_capture.py"
      - "docs/localization/**"
      - "manual-test-reports/visual-opener-harness-20260625/**"
      - "docs/architecture/BRAND_BOUNDARY_RU.md"
      - ".github/workflows/release-acceptance.yml"

jobs:
  acceptance:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: python -m pip install --quiet openpyxl pillow psutil pywinauto

      # --- Artifact (from-source) ---
      - name: Build from-source client (Release)
        run: dotnet build client-src/ZTool.csproj -c Release -warnaserror:false

      - name: Assert produced artifact is branded SWTools
        run: |
          $exe = "client-src/bin/Release/net48/ZTool.exe"
          if (-not (Test-Path $exe)) { throw "from-source build did not produce $exe" }
          $info = (Get-Item $exe).VersionInfo
          Write-Host ("Built {0}  ProductName='{1}'  ProductVersion='{2}'" -f $exe, $info.ProductName, $info.ProductVersion)
          if ($info.ProductName -ne "SWTools") { throw "ProductName is '$($info.ProductName)', expected 'SWTools'" }

      # --- Build-method-independent deterministic checks ---
      - name: Localization name gate (no CJK in tracked paths)
        run: python tools/check_no_cjk_filenames.py

      - name: Russian CHM brand gate
        run: python tools/chm-i18n/check_chm_brand.py help_ru.chm

      - name: Russian CHM help entry route gate
        run: python tools/chm-i18n/check_help_entry_routes.py --chm help_ru.chm

      - name: String invariants self-test (from-source gate)
        run: python tools/check_source_string_invariants.py --self-test

      - name: String invariants - from-source source tree (client + add-in)
        run: python tools/check_source_string_invariants.py --root client-src --root client-src-addin

      - name: Visual surface profile gate
        run: |
          python tools/e2e/check_visual_surface_profile.py --self-test
          python tools/e2e/check_visual_surface_profile.py `
            docs/localization/VISUAL_LOCALIZATION_SURFACES_L01_L15.json `
            docs/localization/HELP_ENTRY_VISUAL_SURFACES_H01_H03.json

      - name: Visible brand boundary self-test
        run: python tools/check_visible_brand_boundary.py --self-test

      - name: Visible brand boundary gate
        run: python tools/check_visible_brand_boundary.py

      - name: Visual surface profile self-test
        run: python tools/e2e/check_visual_surface_profile.py --self-test

      - name: Visual surface profile gate
        run: python tools/e2e/check_visual_surface_profile.py docs/localization/VISUAL_LOCALIZATION_SURFACES_L01_L15.json docs/localization/HELP_ENTRY_VISUAL_SURFACES_H01_H03.json

      - name: Visual opener profile self-test
        run: python tools/e2e/check_visual_opener_profile.py --self-test

      - name: Visual opener profile gate
        run: python tools/e2e/check_visual_opener_profile.py docs/localization/VISUAL_LOCALIZATION_OPENERS_L01_L15.json --surface-file docs/localization/VISUAL_LOCALIZATION_SURFACES_L01_L15.json

      - name: Visual localization manifest assertion self-test
        run: python tools/e2e/selftest_assert_visual_localization_manifest.py

      - name: IPC handshake parity self-test (EXE <-> add-in)
        run: python tools/check_ipc_handshake_parity.py --self-test

      - name: IPC handshake parity (EXE Getpkt pin == add-in expected token)
        run: python tools/check_ipc_handshake_parity.py

      - name: BOM export pre-flight - root SWTools.settings
        run: python client-core/tools/check_bom_template.py SWTools.settings

      - name: BOM export pre-flight - client-core/dist/SWTools.settings
        run: python client-core/tools/check_bom_template.py client-core/dist/SWTools.settings

      - name: BOM export asserter self-test
        run: python tools/bom_export_assert.py --self-test

      - name: BOM export asserter - committed example fixture
        run: python tools/bom_export_assert.py tools/golden/example_bom.xlsx tools/golden/example_bom.golden.json
