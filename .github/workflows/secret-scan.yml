name: secret-scan

on:
  pull_request:
  push:
    branches:
      - main
      - "hardening/**"

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile repository tools
        run: python -m py_compile tools/secret_scan.py tools/release_manifest.py

      - name: Scan tracked files for committed secrets
        run: python tools/secret_scan.py

      - name: Smoke release manifest generator
        run: python tools/release_manifest.py --output /tmp/swtools-release-manifest-test.json
