services:
  swtools-license-server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - .env
    ports:
      - "58000:58000"
    volumes:
      - ./data:/var/lib/swtools-license-server
      - ./keys:/etc/swtools-license-server:ro
    restart: unless-stopped
