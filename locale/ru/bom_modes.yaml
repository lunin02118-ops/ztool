# Русские режимы экспорта спецификаций (BOM)
# Это эталонный файл — содержит все режимы и их параметры.
# Редактировать значения фильтров: ZTool.settings → <FilterRulesList>

modes:
  - id: summary
    name: "Экспорт сводной спецификации"
    type: 0
    image: false
    filter: null
    description: "Все компоненты в одном списке, количество суммировано"

  - id: summary_thumb
    name: "Экспорт сводной спецификации (с эскизами)"
    type: 0
    image: true
    filter: null
    description: "Сводка + миниатюры деталей"

  - id: indented
    name: "Экспорт иерархической спецификации"
    type: 1
    image: false
    filter: null
    description: "С вложенностью (уровни сборки)"

  - id: indented_thumb
    name: "Экспорт иерархической спецификации (с эскизами)"
    type: 1
    image: true
    filter: null
    description: "Иерархия + миниатюры"

  - id: machined
    name: "Обрабатываемые детали"
    type: 0
    image: false
    filter: "Обрабатываемые детали"
    description: "Только детали с типом: Мех.обработка, Листовая, Литьё, Сварка"

  - id: purchased
    name: "Покупные изделия"
    type: 0
    image: false
    filter: "Покупные изделия"
    description: "Только детали с типом: Покупное, Стандартное"

  - id: top_level
    name: "Экспорт спецификации верхнего уровня"
    type: 2
    image: false
    filter: null
    description: "Только прямые дочерние компоненты (Level 1)"

  - id: parts_only
    name: "Экспорт сводной спецификации деталей"
    type: 3
    image: false
    filter: null
    description: "Только детали (.SLDPRT), без подсборок"

filter_rules:
  - id: machined_parts
    name: "Обрабатываемые детали"
    highlight: false
    conditions:
      - property: "Тип"
        operator: "contains"  # -> "Содержит"
        # 机加 = текущее значение «Тип» в демо-модели; остальное — русские заглушки
        value: "机加;Мех.обработка;Листовая;Литьё;Сварка"

  - id: purchased_parts
    name: "Покупные изделия"
    highlight: false
    conditions:
      - property: "Тип"
        operator: "contains"  # -> "Содержит"
        # 外购 = текущее значение «Тип» в демо-модели; остальное — русские заглушки
        value: "外购;Покупное;Стандартное"

  - id: with_surface_treatment
    name: "С обработкой поверхности"
    highlight: false
    conditions:
      - property: "Тип"
        operator: "contains"  # -> "Содержит"
        value: "机加;Мех.обработка;Листовая;Литьё;Сварка"
      - property: "Обработка поверхности"
        operator: "not_equals"  # -> "Не равно"
        value: ""

  - id: without_surface_treatment
    name: "Без обработки поверхности"
    highlight: false
    conditions:
      - property: "Тип"
        operator: "contains"  # -> "Содержит"
        value: "机加;Мех.обработка;Листовая;Литьё;Сварка"
      - property: "Обработка поверхности"
        operator: "equals"  # -> "Равно"
        value: ""

  - id: missing_required
    name: "Недостающие обязательные свойства"
    highlight: true
    conditions:
      - property: "Тип"
        operator: "equals"
        value: ""
      - property: "Номер чертежа"
        operator: "equals"
        value: ""
      - property: "Материал"
        operator: "equals"
        value: ""
      - property: "Масса"
        operator: "equals"
        value: ""
      - property: "Имя детали"
        operator: "equals"
        value: ""

# Операторы: абстрактный код (выше) -> локализованная строка, которую ZTool.exe
# ожидает в сериализованном правиле (поле array[1]). Русифицированная сборка:
#   contains      -> "Содержит"            not_contains   -> "Не содержит"
#   equals        -> "Равно"               not_equals     -> "Не равно"
#   starts_with   -> "Начинается с"        not_starts     -> "Не начинается с"
#   ends_with     -> "Заканчивается на"     not_ends       -> "Не заканчивается на"
#
# Сериализация в ZTool.settings (ровно три поля, разделитель = ТАБ + |@#$%|):
#   $Тип$<TAB>|@#$%|Содержит<TAB>|@#$%|机加;Мех.обработка
# Пробелы вместо табуляции → правило игнорируется, экспорт не фильтруется.
# 外购/机加 — фактические значения «Тип» в демо-модели; замените на свои.
